<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Details - MediCare HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style th:replace="~{fragments/layout :: styles}"></style>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar('patients')}"></div>
    <main class="main-content">
        <div class="page-actions">
            <h2 th:text="${patient.fullName}">Patient</h2>
            <div style="display:flex; gap:12px;">
                <a th:href="@{/patients/{id}/edit(id=${patient.id})}" class="btn btn-primary">Edit</a>
                <a th:href="@{/patients}" class="btn btn-secondary">Back</a>
            </div>
        </div>
        <div class="card">
            <div class="detail-grid">
                <div class="detail-item"><label>Email</label><p th:text="${patient.email}"></p></div>
                <div class="detail-item"><label>Phone</label><p th:text="${patient.phone}"></p></div>
                <div class="detail-item"><label>Age</label><p th:text="${patient.age}"></p></div>
                <div class="detail-item"><label>Gender</label><p th:text="${patient.gender}"></p></div>
                <div class="detail-item"><label>Blood Group</label><p th:text="${patient.bloodGroup}"></p></div>
                <div class="detail-item"><label>Address</label><p th:text="${patient.address}"></p></div>
            </div>
            <div class="detail-item" style="margin-top:16px;">
                <label>Medical History</label>
                <p th:text="${patient.medicalHistory ?: 'No history recorded'}"></p>
            </div>
        </div>
    </main>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Department - MediCare HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style th:replace="~{fragments/layout :: styles}"></style>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar('departments')}"></div>
    <main class="main-content">
        <h2 style="margin-bottom: 24px;">Add Department</h2>
        <div class="card" style="max-width: 500px;">
            <form method="post" th:action="@{/departments/add}">
                <div class="form-group">
                    <label>Department Name</label>
                    <input type="text" name="name" required placeholder="e.g. Radiology">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Floor</label>
                    <input type="text" name="floor" placeholder="e.g. Floor 2">
                </div>
                <div style="display:flex; gap:12px;">
                    <button type="submit" class="btn btn-primary">Save Department</button>
                    <a th:href="@{/departments}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>

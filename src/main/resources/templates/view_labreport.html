<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Lab Report</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; }
        .container { width: 500px; margin: 40px auto; background: #fff; padding: 20px;
            border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .field { margin: 10px 0; }
        .label { font-weight: bold; color: #555; }
        .value { margin-left: 10px; color: #333; }
        a { display: inline-block; margin-top: 20px; padding: 10px 15px;
            background-color: #27ae60; color: #fff; text-decoration: none;
            border-radius: 4px; }
        a:hover { background-color: #1e8449; }
    </style>
</head>
<body>
<div class="container">
    <h2>Lab Report Details</h2>

    <div class="field">
        <span class="label">Patient Name:</span>
        <span class="value" th:text="${report.patientName}"></span>
    </div>

    <div class="field">
        <span class="label">Lab Field:</span>
        <span class="value" th:text="${report.labField ?: 'Unassigned'}"></span>
    </div>

    <div class="field">
        <span class="label">Specialist:</span>
        <span class="value" th:text="${report.specialistName ?: 'Hospital Lab'}"></span>
    </div>

    <div class="field">
        <span class="label">Test Type:</span>
        <span class="value" th:text="${report.testType}"></span>
    </div>

    <div class="field">
        <span class="label">Result:</span>
        <span class="value" th:text="${report.result}"></span>
    </div>

    <a th:href="@{/labreports}">Back to Reports</a>
</div>
</body>
</html>

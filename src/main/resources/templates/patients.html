<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients - MediCare HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style th:replace="~{fragments/layout :: styles}"></style>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar('patients')}"></div>
    <main class="main-content">
        <div class="page-actions">
            <h2>Patients</h2>
            <a th:href="@{/patients/add}" class="btn btn-primary">+ Add Patient</a>
        </div>
        <form class="search-bar" method="get" th:action="@{/patients/search}">
            <input type="text" name="query" placeholder="Search patients by name..." th:value="${query}">
            <button type="submit" class="btn btn-primary">Search</button>
        </form>
        <div class="card table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Age</th>
                        <th>Blood Group</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="patient, iterStat : ${patients}">
                        <td th:text="${iterStat.count}"></td>
                        <td th:text="${patient.fullName}"></td>
                        <td th:text="${patient.email}"></td>
                        <td th:text="${patient.phone}"></td>
                        <td th:text="${patient.age}"></td>
                        <td th:text="${patient.bloodGroup}"></td>
                        <td>
                            <a th:href="@{/patients/{id}(id=${patient.id})}" class="btn btn-secondary btn-sm">View</a>
                            <a th:href="@{/patients/{id}/edit(id=${patient.id})}" class="btn btn-primary btn-sm">Edit</a>
                            <a th:href="@{/patients/{id}/delete(id=${patient.id})}" class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this patient?')">Delete</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(patients)}">
                        <td colspan="7" style="text-align:center; color:#64748b;">No patients found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>

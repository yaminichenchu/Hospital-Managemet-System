<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Hospital Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style th:fragment="styles">
        :root {
            --primary: #0d9488;
            --primary-dark: #0f766e;
            --primary-light: #14b8a6;
            --accent: #0891b2;
            --bg: #f0fdfa;
            --surface: #ffffff;
            --text: #134e4a;
            --text-muted: #5eead4;
            --border: #ccfbf1;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --shadow: 0 4px 24px rgba(13, 148, 136, 0.12);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: #1e293b;
            min-height: 100vh;
        }
        .app-layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #0f766e 0%, #134e4a 100%);
            color: white;
            padding: 24px 0;
            flex-shrink: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-brand {
            padding: 0 24px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 16px;
        }
        .sidebar-brand h1 { font-size: 20px; font-weight: 700; }
        .sidebar-brand p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 32px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .top-bar h2 { font-size: 28px; color: var(--text); font-weight: 700; }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--surface);
            padding: 10px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .user-badge .role { font-size: 12px; color: var(--primary); font-weight: 600; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            color: white;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(13,148,136,0.4); }
        .btn-secondary { background: #e2e8f0; color: #475569; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-video { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
        .btn-video:hover { background: #bfdbfe; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(147,197,253,0.5); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 24px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }
        .stat-card h3 { font-size: 36px; color: var(--primary); font-weight: 700; }
        .stat-card p { color: #64748b; font-size: 14px; margin-top: 4px; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f0fdfa; color: var(--text); font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:hover td { background: #f8fffe; }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-scheduled { background: #dbeafe; color: #1d4ed8; }
        .badge-confirmed { background: #d1fae5; color: #047857; }
        .badge-completed { background: #e0e7ff; color: #4338ca; }
        .badge-cancelled { background: #fee2e2; color: #b91c1c; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .search-bar { display: flex; gap: 12px; margin-bottom: 24px; }
        .search-bar input { flex: 1; padding: 12px 16px; border: 2px solid var(--border); border-radius: 8px; }
        .alert { padding: 14px 18px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .alert-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .page-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
        .detail-item { padding: 16px; background: #f8fffe; border-radius: 8px; }
        .detail-item label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .detail-item p { font-size: 16px; font-weight: 600; color: var(--text); margin-top: 4px; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-left: 0; padding: 16px; }
        }
    </style>
</head>
<body>
<div th:fragment="sidebar(activePage)" class="sidebar">
    <div class="sidebar-brand">
        <h1>🏥 MediCare HMS</h1>
        <p>Hospital Management System</p>
    </div>
    <nav>
        <a th:href="@{/dashboard}" class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active'">📊 Dashboard</a>

        <!-- Admin & Staff -->
        <a th:if="${session.userRole == 'ROLE_ADMIN' or session.userRole == 'ROLE_RECEPTIONIST' or session.userRole == 'ROLE_NURSE'}"
           th:href="@{/patients}" class="nav-link" th:classappend="${activePage == 'patients'} ? 'active'">👥 Patients</a>
        <a th:if="${session.userRole == 'ROLE_ADMIN' or session.userRole == 'ROLE_RECEPTIONIST' or session.userRole == 'ROLE_NURSE'}"
           th:href="@{/doctors}" class="nav-link" th:classappend="${activePage == 'doctors'} ? 'active'">👨‍⚕️ Doctors</a>

        <!-- All roles except none -->
        <a th:if="${session.userRole != 'ROLE_LAB_SPECIALIST'}"
           th:href="@{/appointments}" class="nav-link" th:classappend="${activePage == 'appointments'} ? 'active'">📅 Appointments</a>
        <a th:if="${session.userRole != 'ROLE_LAB_SPECIALIST'}"
           th:href="@{/video-consultations}" class="nav-link" th:classappend="${activePage == 'video-consultations'} ? 'active'">📹 Video Consultation</a>

        <!-- Admin & Staff -->
        <a th:if="${session.userRole == 'ROLE_ADMIN' or session.userRole == 'ROLE_RECEPTIONIST' or session.userRole == 'ROLE_NURSE'}"
           th:href="@{/departments}" class="nav-link" th:classappend="${activePage == 'departments'} ? 'active'">🏢 Departments</a>

        <!-- Patient, Doctor, Admin, Staff -->
        <a th:if="${session.userRole == 'ROLE_ADMIN' or session.userRole == 'ROLE_DOCTOR' or session.userRole == 'ROLE_PATIENT' or session.userRole == 'ROLE_RECEPTIONIST' or session.userRole == 'ROLE_NURSE' or session.userRole == 'ROLE_LAB_SPECIALIST'}"
           th:href="@{/labreports}" class="nav-link" th:classappend="${activePage == 'labreports'} ? 'active'">🧪 Lab Reports</a>

        <a th:href="@{/logout}" class="nav-link" style="margin-top: 24px; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 24px;">🚪 Logout</a>
    </nav>
</div>
</body>
</html>

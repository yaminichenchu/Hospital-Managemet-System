<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Doctor - MediCare HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style th:replace="~{fragments/layout :: styles}"></style>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar('doctors')}"></div>
    <main class="main-content">
        <h2 style="margin-bottom: 24px;">Edit Doctor</h2>
        <div class="card" style="max-width: 600px;">
            <form method="post" th:action="@{/doctors/{id}/edit(id=${doctor.id})}">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="fullName" th:value="${doctor.fullName}" required>
                </div>
                <div class="form-group">
                    <label>Specialization</label>
                    <input type="text" name="specialization" th:value="${doctor.specialization}" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" th:value="${doctor.email}" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" th:value="${doctor.phone}">
                </div>
                <div class="form-group">
                    <label>Consultation Hours</label>
                    <input type="text" name="consultationHours" th:value="${doctor.consultationHours}"
                           placeholder="e.g. Mon-Fri, 9:00 AM - 5:00 PM">
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select name="departmentId" required>
                        <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"
                                th:selected="${doctor.department?.id == dept.id}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" name="available" value="true" th:checked="${doctor.available}"> Available</label>
                </div>
                <div style="display:flex; gap:12px;">
                    <button type="submit" class="btn btn-primary">Update Doctor</button>
                    <a th:href="@{/doctors}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>

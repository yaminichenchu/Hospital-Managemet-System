<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Lab Specialist Details - MediCare HMS')}">
    <style th:replace="~{fragments/layout :: styles}"></style>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar('dashboard')}"></div>
    <main class="main-content">
        <div class="top-bar">
            <h2>Lab Specialist Details</h2>
            <div class="user-badge">
                <div>
                    <div th:text="${userName}">User</div>
                    <div class="role" th:text="${userRole}">Role</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:24px;">
                <div style="min-width:200px; padding:18px 20px; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:12px;">
                    <div style="font-size:14px; color:#047857;">Total Reports</div>
                    <div style="font-size:28px; font-weight:700; color:#064e3b;" th:text="${labReportTotal}">0</div>
                </div>
                <div style="min-width:200px; padding:18px 20px; background:#eff6ff; border:1px solid #93c5fd; border-radius:12px;">
                    <div style="font-size:14px; color:#1d4ed8;">Total Patients</div>
                    <div style="font-size:28px; font-weight:700; color:#1e3a8a;" th:text="${patientTotal}">0</div>
                </div>
                <div style="min-width:200px; padding:18px 20px; background:#fff7ed; border:1px solid #fdba74; border-radius:12px;">
                    <div style="font-size:14px; color:#c2410c;">Specialist Field</div>
                    <div style="font-size:22px; font-weight:700; color:#7c2d12;" th:text="${specialist.labField ?: 'Unassigned'}">Field</div>
                </div>
            </div>
            <div class="detail-grid">
                <div class="detail-item">
                    <label>Name</label>
                    <p th:text="${specialist.fullName}">Name</p>
                </div>
                <div class="detail-item">
                    <label>Email</label>
                    <p th:text="${specialist.email}">Email</p>
                </div>
                <div class="detail-item">
                    <label>Phone</label>
                    <p th:text="${specialist.phone ?: 'N/A'}">Phone</p>
                </div>
                <div class="detail-item">
                    <label>Field</label>
                    <p th:text="${specialist.labField ?: 'Unassigned'}">Field</p>
                </div>
                <div class="detail-item">
                    <label>Specialist</label>
                    <p th:text="${specialist.specialistTitle ?: 'Lab Specialist'}">Specialist</p>
                </div>
            </div>
            <div style="margin-top:24px; display:flex; gap:12px; flex-wrap:wrap;">
                <a th:href="@{/lab-specialists}" class="btn btn-secondary">Back</a>
                <form th:if="${specialist.labField == null or #strings.isEmpty(specialist.labField)}"
                      th:action="@{/lab-specialists/delete/{id}(id=${specialist.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger"
                            onclick="return confirm('Delete this unassigned lab specialist?')">Delete Unassigned</button>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Upload Lab Report</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; }
        .container { width: 400px; margin: 40px auto; background: #fff; padding: 20px; border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-bottom: 20px; text-align: center; }
        label { display: block; margin-top: 10px; color: #555; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 20px; width: 100%; padding: 10px; background-color: #3498db; color: #fff;
            border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #2980b9; }
        .
    </style>
</head>
<body>
<div class="container">
    <h2>Upload New Lab Report</h2>
    <form th:action="@{/labreports/upload}" method="post">
        <label for="patientSelect">Patient</label>
        <select id="patientEmail" name="patientEmail" required>
            <option value="">Select patient</option>
            <option th:each="patient : ${patients}"
                    th:value="${patient.email}"
                    th:text="${patient.fullName}"></option>
        </select>

        <label for="labField">Lab Field</label>
        <select id="labField" name="labField" required>
            <option value="">Select field</option>
            <option value="Hematology">Hematology</option>
            <option value="Biochemistry">Biochemistry</option>
            <option value="Microbiology">Microbiology</option>
            <option value="Pathology">Pathology</option>
            <option value="Radiology">Radiology</option>
            <option value="Immunology">Immunology</option>
        </select>
        <p style="margin-top:8px; color:#0f766e; font-size:13px;" th:if="${accountLabField != null and !#strings.isEmpty(accountLabField)}">
            Your account is assigned to <strong th:text="${accountLabField}"></strong> and this form will only suggest relevant patients for that field.
        </p>

        <label for="testType">Test Type</label>
        <input type="text" id="testType" name="testType" required>

        <label for="result">Result</label>
        <input type="text" id="result" name="result" required>

        <button type="submit">Upload Report</button>
    </form>
</div>
</body>
</html>

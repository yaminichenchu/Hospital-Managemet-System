<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lab Reports</title>
    <link rel="stylesheet" href="/css/style.css"/>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; }
        .container { width: 90%; margin: 20px auto; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        .card-grid {
            display: flex;
            flex-direction: column; /* ✅ vertical order */
            gap: 20px;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            padding: 20px;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin: 0; color: #34495e; }
        .card p { margin: 6px 0; color: #555; }
        .actions { margin-top: 12px; }
        .actions a, .actions button {
            margin-right: 8px;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
        }
        .upload-btn {
            display: inline-block;
            padding: 12px 20px;
            background-color: #27ae60; /* green */
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }



        .upload-btn:hover {
            background-color: #1e8449; /* darker green */
        }

        .view-btn { background-color: #3498db; color: #fff; }
        .download-btn { background-color: #2ecc71; color: #fff; }
        .email-btn { background-color: #e67e22; color: #fff; }
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    </style>

</head>
<body>

<div class="container">
    <h2 th:text="${selectedField != null and !#strings.isEmpty(selectedField) ? 'Lab Reports - ' + selectedField : 'Lab Reports'}">Lab Reports</h2>

    <div th:if="${message}"
         th:class="${messageType == 'success' ? 'alert alert-success' : 'alert alert-error'}"
         th:text="${message}"></div>

    <div class="card-grid">
        <div class="card" th:each="report : ${labReports}">
            <h3 th:text="${report.testType}"></h3>
            <p><strong>Result:</strong> <span th:text="${report.result}"></span></p>
            <p><strong>Patient:</strong> <span th:text="${report.patientName}"></span></p>
            <p><strong>Field:</strong> <span th:text="${report.labField ?: 'Unassigned'}"></span></p>
            <p><strong>Specialist:</strong> <span th:text="${report.specialistName ?: 'Hospital Lab'}"></span></p>

            <div class="actions">
                <a th:href="@{/labreports/view/{id}(id=${report.id})}" class="view-btn">View</a>
                <a th:href="@{/labreports/download/{id}(id=${report.id})}" class="download-btn">Download</a>
                <form th:if="${canSendEmail}" th:action="@{/labreports/send/{id}(id=${report.id})}" method="post" style="display:inline;">
                    <button type="submit" class="email-btn">Send to Email</button>
                </form>
                <form th:if="${canDeleteUnassigned and (report.labField == null or #strings.isEmpty(report.labField))}"
                      th:action="@{/labreports/delete/{id}(id=${report.id})}" method="post" style="display:inline;">
                    <button type="submit" class="email-btn"
                            onclick="return confirm('Delete this unassigned lab report?')">Delete Unassigned</button>
                </form>
            </div>
        </div>
    </div>
    <form th:if="${canUpload}" action="/labreports/new" method="get" style="margin-top:20px;">
        <button type="submit" class="upload-btn">+ Upload New Lab Report</button>
    </form>


</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Consultation - MediCare HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style th:replace="~{fragments/layout :: styles}"></style>
    <style>
        .video-page { min-height: 100vh; background: #0f172a; display: flex; flex-direction: column; }
        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: #1e293b;
            color: white;
            flex-wrap: wrap;
            gap: 12px;
        }
        .video-header h2 { font-size: 20px; color: white; }
        .video-meta { font-size: 13px; color: #94a3b8; margin-top: 4px; }
        .video-frame-wrap { flex: 1; padding: 16px; }
        .video-frame-wrap iframe {
            width: 100%;
            height: calc(100vh - 120px);
            min-height: 500px;
            border: none;
            border-radius: 12px;
            background: #000;
        }
    </style>
</head>
<body>
<div class="video-page">
    <div class="video-header">
        <div>
            <h2>Video Consultation</h2>
            <div class="video-meta">
                <span th:text="${appointment.patient.fullName}">Patient</span>
                &nbsp;with&nbsp;
                <span th:text="'Dr. ' + ${appointment.doctor.fullName}">Doctor</span>
                &nbsp;|&nbsp;
                <span th:text="${appointment.appointmentDate}">Date</span>
                at
                <span th:text="${appointment.appointmentTime}">Time</span>
            </div>
        </div>
        <div style="display:flex; gap:12px; align-items:center;">
            <span style="font-size:13px; color:#94a3b8;" th:text="${userName}">User</span>
            <a th:href="@{/video-consultations}" class="btn btn-secondary">Back to List</a>
        </div>
    </div>

    <div class="video-frame-wrap">
        <iframe th:src="${videoLink}"
                allow="camera; microphone; fullscreen; display-capture; autoplay"
                title="Video Consultation"></iframe>
    </div>
</div>
</body>
</html>

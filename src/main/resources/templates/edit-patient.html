<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Patient - MediCare HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style th:replace="~{fragments/layout :: styles}"></style>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar('patients')}"></div>
    <main class="main-content">
        <h2 style="margin-bottom: 24px;">Edit Patient</h2>
        <div class="card" style="max-width: 600px;">
            <form method="post" th:action="@{/patients/{id}/edit(id=${patient.id})}">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="fullName" th:value="${patient.fullName}" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" th:value="${patient.email}" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" th:value="${patient.phone}">
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" th:value="${patient.age}">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender">
                        <option value="MALE" th:selected="${patient.gender?.name() == 'MALE'}">Male</option>
                        <option value="FEMALE" th:selected="${patient.gender?.name() == 'FEMALE'}">Female</option>
                        <option value="OTHER" th:selected="${patient.gender?.name() == 'OTHER'}">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Blood Group</label>
                    <input type="text" name="bloodGroup" th:value="${patient.bloodGroup}">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" name="address" th:value="${patient.address}">
                </div>
                <div class="form-group">
                    <label>Medical History</label>
                    <textarea name="medicalHistory" rows="3" th:text="${patient.medicalHistory}"></textarea>
                </div>
                <div style="display:flex; gap:12px;">
                    <button type="submit" class="btn btn-primary">Update Patient</button>
                    <a th:href="@{/patients/{id}(id=${patient.id})}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>

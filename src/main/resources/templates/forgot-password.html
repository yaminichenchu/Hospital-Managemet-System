<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - MediCare HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f766e 0%, #0891b2 100%);
            padding: 24px;
        }
        .reset-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }
        h1 { text-align: center; color: #134e4a; font-size: 28px; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 28px; font-size: 14px; line-height: 1.5; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; font-size: 14px; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ccfbf1;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: #0d9488; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #14b8a6, #0d9488);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .error-message { background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .back-link { text-align: center; margin-top: 20px; color: #64748b; font-size: 14px; }
        .back-link a { color: #0d9488; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
<div class="reset-container">
    <h1>Forgot Password</h1>
    <p class="subtitle">Enter your registered email address to continue password reset.</p>
    <div th:if="${error}" class="error-message" th:text="${error}"></div>
    <form method="post" th:action="@{/forgot-password}">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="yourname@gmail.com">
        </div>
        <button type="submit" class="btn-submit">Continue</button>
    </form>
    <div class="back-link">
        Remember password? <a th:href="@{/login}">Sign in</a>
    </div>
</div>
</body>
</html>
